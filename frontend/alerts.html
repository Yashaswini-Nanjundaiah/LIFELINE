<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerts — LIFELINE</title>
<link rel="stylesheet" href="shared.css">

<style>
.alert-card {
  background: var(--card-bg);
  border:1px solid var(--border);
  border-radius:3px;
  padding:18px 22px;
  margin-bottom:12px;
  animation:fadeInUp 0.4s ease both;
  transition:all 0.25s;
  position:relative;
  overflow:hidden;
}

.alert-card::before {
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
}

.alert-card.red::before{ background:var(--red); }
.alert-card.orange::before{ background:var(--saffron); }
.alert-card.yellow::before{ background:var(--gold); }
.alert-card.green::before{ background:var(--green); }

.alert-card:hover{
  transform:translateX(3px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.alert-card .alert-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:8px;
}

.alert-card h4{
  font-family:'Rajdhani',sans-serif;
  font-size:1rem;
  font-weight:700;
  color:var(--white);
}

.alert-card .alert-body{
  font-size:0.83rem;
  color:var(--text);
  line-height:1.5;
  margin-bottom:10px;
}

.alert-card .alert-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:0.72rem;
  color:var(--muted);
}

.alert-card .alert-footer .a-tags{
  display:flex;
  gap:6px;
}

.filter-tabs{
  display:flex;
  gap:8px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.filter-tab{
  padding:6px 16px;
  border-radius:2px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-size:0.78rem;
  cursor:pointer;
  font-family:'Rajdhani',sans-serif;
  letter-spacing:0.5px;
  transition:all 0.2s;
}

.filter-tab:hover{
  border-color:var(--saffron);
  color:var(--saffron);
}

.filter-tab.active-tab{
  background:rgba(255,107,0,0.15);
  border-color:var(--saffron);
  color:var(--saffron);
}
</style>
</head>

<body>

<div id="sidebarRoot"></div>

<div class="main">

  <div id="topbarRoot"></div>

  <div class="content">

    <div class="page-header">
      <h2>Alert Centre</h2>
      <p>Manage and dispatch emergency alerts to districts, agencies, and the public</p>
      <div class="header-line"></div>
    </div>

    <div class="stat-grid">

      <div class="stat-card">
        <div class="stat-label">Total Alerts</div>
        <div class="stat-val" id="c1">0</div>
        <div class="stat-sub">All recorded</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Red Alerts</div>
        <div class="stat-val" id="c2">0</div>
        <div class="stat-sub">Immediate action</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Orange Alerts</div>
        <div class="stat-val" id="c3">0</div>
        <div class="stat-sub">High caution</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Alerts Today</div>
        <div class="stat-val" id="c4">0</div>
        <div class="stat-sub">Last 24 hours</div>
      </div>

    </div>

    <div class="two-col">

      <div style="grid-column:1/3">

        <div class="table-card">

          <div class="table-card-header">

            <h3>🚨 Active Alerts</h3>

            <div class="actions">
              <button class="btn btn-primary btn-sm" onclick="openModal('alertModal')">
                + Issue Alert
              </button>
            </div>

          </div>

          <div style="padding:14px 20px">

            <div class="filter-tabs">

              <button class="filter-tab active-tab"
                onclick="setFilter('All',this)">
                All Alerts
              </button>

              <button class="filter-tab"
                onclick="setFilter('Red',this)">
                🔴 Red
              </button>

              <button class="filter-tab"
                onclick="setFilter('Orange',this)">
                🟠 Orange
              </button>

              <button class="filter-tab"
                onclick="setFilter('Yellow',this)">
                🟡 Yellow
              </button>

              <button class="filter-tab"
                onclick="setFilter('Green',this)">
                🟢 Green
              </button>

            </div>

            <div id="alertList"></div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- MODAL -->

<div class="modal-overlay" id="alertModal">

  <div class="modal">

    <div class="modal-header">
      <h3>🚨 Issue New Alert</h3>

      <button class="modal-close"
        onclick="closeModal('alertModal')">
        ✕
      </button>
    </div>

    <div class="form-row">

      <div class="form-group">
        <label>Alert Level</label>

        <select id="al_level">
          <option value="Red">🔴 Red — Extreme</option>
          <option value="Orange">🟠 Orange — High</option>
          <option value="Yellow">🟡 Yellow — Moderate</option>
          <option value="Green">🟢 Green — Advisory</option>
        </select>
      </div>

      <div class="form-group">
        <label>Associated Disaster ID</label>

        <input type="number"
          id="al_disaster"
          placeholder="Enter disaster ID">
      </div>

    </div>

    <div class="form-group">
      <label>Alert Title</label>

      <input type="text"
        id="al_title"
        placeholder="Alert title">
    </div>

    <div class="form-group">
      <label>Message / Description</label>

      <textarea id="al_msg"
        placeholder="Detailed alert message"></textarea>
    </div>

    <div class="form-row">

      <div class="form-group">
        <label>Region</label>

        <input type="text"
          id="al_region"
          placeholder="Affected area">
      </div>

      <div class="form-group">
        <label>Issued By</label>

        <input type="text"
          id="al_by"
          placeholder="Authority">
      </div>

    </div>

    <div class="modal-footer">

      <button class="btn btn-outline"
        onclick="closeModal('alertModal')">
        Cancel
      </button>

      <button class="btn btn-primary"
        onclick="issueAlert()">
        Issue Alert
      </button>

    </div>

  </div>

</div>

<div class="toast" id="global-toast"></div>

<script src="shared.js"></script>

<script>

const auth = requireAuth('alerts');

if(!auth){

}else{

  document.getElementById('sidebarRoot').innerHTML =
    buildSidebar('alerts');

  document.getElementById('topbarRoot').innerHTML =
    buildTopbar('Alerts','Alert Centre');

  let alerts = [];

  let currentFilter = 'All';

  async function loadAlerts(){

    try{

      const res = await fetch(
        "http://localhost:5000/api/alerts"
      );

      alerts = await res.json();

      renderAlerts();

      updateStats();

    }catch(err){

      console.log(err);

      showToast(
        "Failed to load alerts",
        "error"
      );
    }
  }

  function levelColor(l){

    return {
      Red:'red',
      Orange:'orange',
      Yellow:'yellow',
      Green:'green'
    }[l] || 'orange';
  }

  function levelBadge(l){

    const m = {
      Red:'badge-danger',
      Orange:'badge-warning',
      Yellow:'badge-warning',
      Green:'badge-active'
    };

    const icons = {
      Red:'🔴',
      Orange:'🟠',
      Yellow:'🟡',
      Green:'🟢'
    };

    return `
      <span class="badge ${m[l]}">
        ${icons[l]} ${l} Alert
      </span>
    `;
  }

  function renderAlerts(){

    const data =
      currentFilter === 'All'
      ? alerts
      : alerts.filter(a => a.severity === currentFilter);

    const el =
      document.getElementById('alertList');

    if(!data.length){

      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✅</div>
          <p>No alerts found</p>
        </div>
      `;

      return;
    }

    el.innerHTML = data.map((a,i)=>`

      <div class="alert-card ${levelColor(a.severity)}"
        style="animation-delay:${i*0.08}s">

        <div class="alert-head">

          <div>

            <h4>${a.title}</h4>

            <div style="font-size:0.72rem;color:var(--muted);margin-top:2px">

              Alert #${a.alert_id}
              &nbsp;|&nbsp;
              ${new Date(a.issued_at).toLocaleString()}

            </div>

          </div>

          <div>
            ${levelBadge(a.severity)}
          </div>

        </div>

        <div class="alert-body">
          ${a.message}
        </div>

        <div class="alert-footer">

          <div class="a-tags">

            <span class="badge badge-info"
              style="font-size:0.65rem">

              📍 ${a.location}

            </span>

            <span class="badge"
              style="background:rgba(255,255,255,0.05);color:var(--muted);font-size:0.65rem">

              By: ${a.issued_by}

            </span>

          </div>

          <div style="display:flex;gap:8px">

            <button class="btn btn-danger btn-sm"
              onclick="removeAlert(${a.alert_id})">

              Resolve

            </button>

          </div>

        </div>

      </div>

    `).join('');
  }

  window.setFilter = function(f, el){

    currentFilter = f;

    document.querySelectorAll('.filter-tab')
      .forEach(t=>t.classList.remove('active-tab'));

    el.classList.add('active-tab');

    renderAlerts();
  };

  window.issueAlert = async function(){

    const title =
      document.getElementById('al_title')
      .value.trim();

    const message =
      document.getElementById('al_msg')
      .value.trim();

    if(!title || !message){

      showToast(
        'Fill required fields',
        'error'
      );

      return;
    }

    const data = {

      title: title,

      message: message,

      disaster_id:
        document.getElementById('al_disaster').value,

      severity:
        document.getElementById('al_level').value,

      location:
        document.getElementById('al_region').value,

      issued_by:
        document.getElementById('al_by').value
    };

    try{

      const res = await fetch(
        "http://localhost:5000/api/alerts",
        {
          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body: JSON.stringify(data)
        }
      );

      const result = await res.json();

      if(result.success){

        closeModal('alertModal');

        showToast(
          'Alert issued ✓'
        );

        loadAlerts();
      }

    }catch(err){

      console.log(err);

      showToast(
        'Server error',
        'error'
      );
    }
  };

  window.removeAlert = function(id){

    alerts =
      alerts.filter(a => a.alert_id !== id);

    renderAlerts();

    showToast('Alert resolved ✓');
  };

  function updateStats(){

    animateCount(
      document.getElementById('c1'),
      alerts.length
    );

    animateCount(
      document.getElementById('c2'),
      alerts.filter(a =>
        a.severity === 'Red'
      ).length
    );

    animateCount(
      document.getElementById('c3'),
      alerts.filter(a =>
        a.severity === 'Orange'
      ).length
    );

    const today =
      new Date().toDateString();

    animateCount(
      document.getElementById('c4'),
      alerts.filter(a =>
        new Date(a.issued_at)
        .toDateString() === today
      ).length
    );
  }

  window.addEventListener('load',()=>{

    loadAlerts();

  });

}

</script>

</body>
</html>
